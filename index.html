<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebVM — ブラウザで動くPC</title>
    <!--
      coi-serviceworker: GitHub Pages で SharedArrayBuffer を有効にする Service Worker
      type="module" は付けない（グローバルスクリプトとして先に読み込む必要がある）
    -->
    <script>
      // Vite のバンドル対象から除外するためインラインでロード
      (function() {
        var s1 = document.createElement('script');
        s1.src = 'coi-serviceworker.js';
        document.head.appendChild(s1);

        var s2 = document.createElement('script');
        s2.src = 'v86/libv86.js';
        s2.onload = function() {
          // v86 ロード完了フラグ（App.tsx で確認可能）
          window.__v86_loaded = true;
        };
        document.head.appendChild(s2);
      })();
    </script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0f172a; color: #f1f5f9; font-family: 'Segoe UI', Arial, sans-serif; }
    </style>
    <script type="module" crossorigin src="/webvm-app/assets/index-0oIuDLFK.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
