<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebVM</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; }
      body { background: #0f172a; color: #f1f5f9; font-family: 'Segoe UI', Arial, sans-serif; }
      #splash {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #0f172a; z-index: 9999; gap: 14px;
      }
      #splash-title { font-size: 32px; font-weight: 800; color: #38bdf8; }
      #splash-sub   { font-size: 14px; color: #475569; }
      #splash-bar-wrap { width: 260px; height: 5px; background: #1e293b; border-radius: 99px; overflow: hidden; }
      #splash-bar { height: 100%; width: 0%; background: linear-gradient(90deg,#38bdf8,#818cf8); border-radius: 99px; transition: width 0.4s; }
      #splash-err { font-size: 13px; color: #f87171; max-width: 420px; text-align: center; display: none; padding: 10px 16px; background: #1f0000; border: 1px solid #7f1d1d; border-radius: 8px; }
    </style>
    <script type="module" crossorigin src="/webvm-app/assets/index-MdLDOktd.js"></script>
  </head>
  <body>
    <div id="splash">
      <div style="font-size:56px">🖥️</div>
      <div id="splash-title">WebVM</div>
      <div id="splash-sub">読み込み中...</div>
      <div id="splash-bar-wrap"><div id="splash-bar"></div></div>
      <div id="splash-err"></div>
    </div>

    <div id="root"></div>

    <script>
      var bar = document.getElementById('splash-bar')
      var sub = document.getElementById('splash-sub')
      var errDiv = document.getElementById('splash-err')

      function setP(pct, msg) { bar.style.width = pct + '%'; sub.textContent = msg }
      function showErr(msg) { errDiv.style.display = 'block'; errDiv.textContent = '❌ ' + msg }
      function hideSplash() { var el = document.getElementById('splash'); if (el) el.remove() }
      window.__onAppMounted = function() { setP(100, '完了！'); setTimeout(hideSplash, 300) }

      // Step1: coi-serviceworker (GitHub Pages で SharedArrayBuffer を有効化)
      setP(10, 'coi-serviceworker を読み込み中...')
      var coiUrls = [
        'coi-serviceworker.js',
        'https://cdn.jsdelivr.net/gh/gzuidhof/coi-serviceworker@master/coi-serviceworker.js'
      ]
      function loadCOI(i) {
        if (i >= coiUrls.length) { loadV86(); return }
        var s = document.createElement('script')
        s.src = coiUrls[i]
        s.onload = function() { setP(30, 'v86エンジンを読み込み中...'); loadV86() }
        s.onerror = function() { loadCOI(i + 1) }
        document.head.appendChild(s)
      }

      // Step2: libv86.js (CDNから直接読み込む → Gitに含めない)
      var v86Urls = [
        'https://cdn.jsdelivr.net/gh/copy/v86@master/build/libv86.js',
        'https://rawcdn.githack.com/copy/v86/master/build/libv86.js',
        'v86/libv86.js'  // ローカルはフォールバック
      ]
      function loadV86(i) {
        i = i || 0
        if (i >= v86Urls.length) {
          showErr('v86エンジンの読み込みに失敗しました。ネット接続を確認してください。')
          loadReact()
          return
        }
        setP(30 + i * 15, 'v86を読み込み中... (' + (i+1) + '/' + v86Urls.length + ')')
        var s = document.createElement('script')
        s.src = v86Urls[i]
        s.onload = function() {
          window.__v86_loaded = true
          setP(70, 'Reactアプリを起動中...')
          loadReact()
        }
        s.onerror = function() { loadV86(i + 1) }
        document.head.appendChild(s)
      }

      function loadReact() {
        setP(85, 'アプリを初期化中...')
        setTimeout(hideSplash, 4000)
      }

      loadCOI(0)
    </script>

  </body>
</html>
