<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebVM</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; }
      body { background: #0f172a; color: #f1f5f9; font-family: 'Segoe UI', Arial, sans-serif; }
      #splash {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #0f172a; z-index: 9999; gap: 14px;
      }
      #splash-bar-wrap { width: 260px; height: 5px; background: #1e293b; border-radius: 99px; overflow: hidden; }
      #splash-bar { height: 100%; width: 0%; background: linear-gradient(90deg,#38bdf8,#6366f1); border-radius: 99px; transition: width 0.4s; }
      #splash-err {
        font-size: 13px; color: #fca5a5; max-width: 420px; text-align: center;
        background: #1f0000; border: 1px solid #7f1d1d; border-radius: 10px;
        padding: 12px 18px; display: none; line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div style="font-size:52px">🖥️</div>
      <div style="font-size:28px;font-weight:800;color:#38bdf8">WebVM</div>
      <div id="splash-sub" style="font-size:14px;color:#475569">読み込み中...</div>
      <div id="splash-bar-wrap"><div id="splash-bar"></div></div>
      <div id="splash-err"></div>
    </div>

    <div id="root"></div>

    <script>
      var bar = document.getElementById('splash-bar')
      var sub = document.getElementById('splash-sub')
      var err = document.getElementById('splash-err')

      function prog(pct, msg) { bar.style.width = pct + '%'; sub.textContent = msg }
      function showErr(msg) { err.style.display = 'block'; err.innerHTML = msg }
      function hideSplash() { var el = document.getElementById('splash'); if (el) el.remove() }

      // ベースパス自動検出（GitHub Pages / ローカル両対応）
      var base = (function() {
        var p = location.pathname
        // /webvm-app/ のようなサブパスを検出
        var m = p.match(/^(\/[^/]+\/)/)
        // index.htmlがサブパスにあるかチェック
        if (m && m[1] !== '/') return m[1]
        return '/'
      })()

      prog(15, 'coi-serviceworker を準備中...')

      // Step1: coi-serviceworker（GitHub Pages COOP/COEP対応）
      var sw = document.createElement('script')
      sw.src = base + 'coi-serviceworker.js'
      sw.onerror = function() {
        // なくても続行（ローカル開発時など）
        console.warn('coi-sw not found, continuing without it')
        loadV86()
      }
      sw.onload = function() { prog(35, 'v86エンジンを読み込み中...'); loadV86() }
      document.head.appendChild(sw)

      // Step2: libv86.js（ローカル → CDNフォールバック）
      function loadV86() {
        tryLoad(
          [
            base + 'v86/libv86.js',
            'https://cdn.jsdelivr.net/gh/copy/v86@master/build/libv86.js',
          ],
          function() {
            window.__v86_loaded = true
            prog(80, 'Reactアプリを起動中...')
            setTimeout(hideSplash, 3000)
          },
          function(tried) {
            showErr(
              '❌ v86エンジンの読み込みに失敗しました。<br><br>' +
              '試したURL:<br>' + tried.map(function(u){ return '• ' + u }).join('<br>') +
              '<br><br>' +
              '解決策: <code>npm run setup</code> を実行後 <code>npm run deploy:github</code>'
            )
            window.__v86_loaded = false
            setTimeout(hideSplash, 6000)
          }
        )
      }

      // 複数URLを順番に試す汎用ローダー
      function tryLoad(urls, onSuccess, onAllFail) {
        var tried = []
        function next() {
          if (urls.length === 0) { onAllFail(tried); return }
          var url = urls.shift()
          tried.push(url)
          var s = document.createElement('script')
          s.src = url
          s.onload = function() { onSuccess() }
          s.onerror = function() {
            console.warn('Failed to load:', url)
            document.head.removeChild(s)
            next()
          }
          document.head.appendChild(s)
        }
        next()
      }

      window.__onAppMounted = function() { prog(100, '完了！'); setTimeout(hideSplash, 300) }
      window.addEventListener('error', function(e) { console.error('Global:', e.message) })
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
