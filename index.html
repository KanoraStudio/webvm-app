<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebVM</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; }
      body { background: #0f172a; color: #f1f5f9; font-family: 'Segoe UI', Arial, sans-serif; }
      #splash {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #0f172a; z-index: 9999; gap: 16px;
      }
      #splash-title { font-size: 28px; font-weight: 800; color: #38bdf8; }
      #splash-sub   { font-size: 14px; color: #475569; }
      #splash-bar-wrap { width: 240px; height: 4px; background: #1e293b; border-radius: 99px; overflow: hidden; }
      #splash-bar { height: 100%; width: 0%; background: #38bdf8; border-radius: 99px; transition: width 0.3s; }
      #splash-err { font-size: 13px; color: #f87171; max-width: 400px; text-align: center; display: none; }
    </style>
    <script type="module" crossorigin src="/webvm-app/assets/index-DrdVVaTs.js"></script>
  </head>
  <body>
    <!-- スプラッシュ画面（JS読み込み中に表示） -->
    <div id="splash">
      <div style="font-size:48px">🖥️</div>
      <div id="splash-title">WebVM</div>
      <div id="splash-sub">読み込み中...</div>
      <div id="splash-bar-wrap"><div id="splash-bar"></div></div>
      <div id="splash-err"></div>
    </div>

    <div id="root"></div>

    <script>
      var bar = document.getElementById('splash-bar')
      var sub = document.getElementById('splash-sub')
      var err = document.getElementById('splash-err')

      function setProgress(pct, msg) {
        bar.style.width = pct + '%'
        sub.textContent = msg
      }

      function showError(msg) {
        err.style.display = 'block'
        err.textContent = '❌ ' + msg
        sub.textContent = '以下のエラーが発生しました'
      }

      function hideSplash() {
        var el = document.getElementById('splash')
        if (el) el.remove()
      }

      setProgress(10, 'coi-serviceworker を読み込み中...')

      // Step1: coi-serviceworker（GitHub Pages で SharedArrayBuffer を有効にする）
      var sw = document.createElement('script')
      sw.src = 'coi-serviceworker.js'
      sw.onerror = function() {
        // coi-sw がなくてもとりあえず続行（ローカル開発時はヘッダーで対応）
        console.warn('coi-serviceworker.js not found, continuing...')
        loadV86()
      }
      sw.onload = function() {
        setProgress(30, 'v86 エンジンを読み込み中...')
        loadV86()
      }
      document.head.appendChild(sw)

      // Step2: libv86.js（v86エミュレーター本体）
      var v86Loaded = false
      function loadV86() {
        var v = document.createElement('script')
        v.src = 'v86/libv86.js'
        v.onload = function() {
          v86Loaded = true
          window.__v86_loaded = true
          setProgress(70, 'React アプリを起動中...')
          loadReact()
        }
        v.onerror = function() {
          showError('v86/libv86.js の読み込みに失敗しました。npm run setup を実行してください。')
          // v86なしでもUIは表示する（エミュレーター機能は使えない）
          window.__v86_loaded = false
          setProgress(70, 'React アプリを起動中（v86なし）...')
          loadReact()
        }
        document.head.appendChild(v)
      }

      // Step3: React アプリ本体
      function loadReact() {
        // Vite がビルドした JS を動的に読む
        // ビルド済みの場合は assets/ 配下に生成される
        // 開発時は /src/main.tsx を直接読む
        setProgress(90, 'アプリを初期化中...')
        // main.tsx は type=module で読み込む（Vite/ESM用）
        var m = document.createElement('script')
        m.type = 'module'
        m.src = 'src/main.tsx'
        m.onerror = function() {
          // 開発時パスが失敗 → ビルド済みを試みる（本番は Vite が書き換える）
          console.log('dev path failed, app may already be injected by Vite')
        }
        document.head.appendChild(m)
        // 3秒後もsplashが残っていたら非表示に
        setTimeout(hideSplash, 3000)
      }

      // React がマウントしたらスプラッシュを消す
      window.__onAppMounted = function() {
        setProgress(100, '完了！')
        setTimeout(hideSplash, 300)
      }

      // グローバルエラーハンドラー
      window.addEventListener('error', function(e) {
        console.error('Global error:', e.message)
      })
    </script>

    <!-- Vite 開発サーバー / ビルド時はここに自動挿入される -->
  </body>
</html>
